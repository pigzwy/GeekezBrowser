<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>GeekEZ Browser</title>
    <style>
        :root {
            --transition-speed: 0.3s;
            --row-height: 24px;
        }

        [data-theme="geek"] {
            --bg-color: #1e1e2d;
            --card-bg: #2b2b40;
            --text-primary: #ffffff;
            --text-secondary: #a0a0ba;
            --accent: #00e0ff;
            --danger: #f64e60;
            --border: #3f4254;
            --splash-bg: #000000;
            --splash-color: #00e0ff;
            --input-bg: #181824;
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent: #d63031;
            --danger: #e17055;
            --border: #dfe6e9;
            --splash-bg: #fff;
            --splash-color: #d63031;
            --input-bg: #f9f9f9;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #757575;
            --accent: #66bb6a;
            --danger: #ef5350;
            --border: #333333;
            --splash-bg: #121212;
            --splash-color: #66bb6a;
            --input-bg: #2c2c2c;
        }

        body {
            font-family: 'Segoe UI', 'Roboto Mono', monospace;
            padding: 20px;
            background: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            overflow: hidden;
            transition: background var(--transition-speed);
            padding-top: 40px !important;
            -webkit-app-region: drag;
        }

        button,
        input,
        textarea,
        select,
        .icon-btn,
        .profile-item,
        .modal-content,
        .lang-btn,
        .logo {
            -webkit-app-region: no-drag;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            margin-top: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0;
            font-family: 'Courier New', monospace;
            transform: skewX(-10deg);
            cursor: default;
            user-select: none;
        }

        .logo-svg {
            height: 28px;
            width: auto;
            margin-right: -4px;
            position: relative;
            top: -2px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-primary);
            letter-spacing: -1px;
            display: flex;
            align-items: baseline;
        }

        .logo-text span.highlight {
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
            margin-left: 1px;
        }

        .logo-text span.ver {
            font-size: 12px;
            opacity: 0.6;
            font-weight: normal;
            margin-left: 6px;
            transform: skewX(10deg);
        }

        .running-badge {
            display: none;
            font-size: 10px;
            font-weight: bold;
            color: #27ae60;
            border: 1px solid #27ae60;
            background: rgba(39, 174, 96, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 10px;
            text-transform: uppercase;
            animation: badgePulse 2s infinite;
            vertical-align: middle;
        }

        .running-badge.active {
            display: inline-block;
        }

        @keyframes badgePulse {
            50% {
                opacity: 1;
                box-shadow: 0 0 5px rgba(39, 174, 96, 0.5);
            }
        }

        input,
        textarea,
        select {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 12px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
            outline: none;
        }

        button {
            padding: 0 12px;
            height: 30px;
            cursor: pointer;
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.2s;
            text-transform: uppercase;
            font-family: monospace;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        button.outline:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        button.danger {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        button.danger:hover {
            background: var(--danger);
            color: #fff;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            height: 24px;
        }

        .theme-select {
            height: 100%;
            padding: 0 8px;
            line-height: 22px;
            margin: 0;
            background: var(--bg-color);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .icon-btn {
            cursor: pointer;
            color: var(--text-secondary);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .icon-btn:hover {
            color: var(--accent);
        }

        .lang-btn {
            cursor: pointer;
            font-size: 12px;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0 6px;
            border-radius: 4px;
            height: 24px;
            line-height: 22px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: no-drag;
        }

        .toolbar {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
        }

        .status-badge {
            font-size: 12px;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .sub-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .sub-left {
            display: flex;
            gap: 10px;
        }

        .sub-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: 15px;
            width: 220px;
            font-size: 12px;
            margin: 0;
            transition: width 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent);
            outline: none;
            width: 260px;
        }

        .layout {
            display: flex;
            gap: 15px;
            height: calc(100vh - 200px);
        }

        .main-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
            color: var(--text-secondary);
            opacity: 0.6;
            text-align: center;
            grid-column: 1 / -1;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            color: var(--accent);
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .main-list.grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            grid-auto-rows: min-content;
            align-content: start;
            gap: 10px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .profile-item {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            transition: 0.2s;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-item:hover {
            border-color: var(--accent);
            transform: translateX(2px);
        }

        .profile-info h4 {
            margin: 0 0 5px 0;
            font-size: 15px;
            color: var(--text-primary);
        }

        .profile-meta {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .tag {
            background: var(--bg-color);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .quick-switch-select {
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 11px;
            width: auto;
            cursor: pointer;
            font-weight: bold;
            padding: 0;
            margin: 0;
        }

        .quick-switch-select option {
            background: var(--card-bg);
            color: var(--text-primary);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .main-list.grid-view .profile-item {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            padding: 15px;
        }

        .main-list.grid-view .profile-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        .main-list.grid-view .profile-info {
            width: 100%;
        }

        .main-list.grid-view .profile-meta {
            flex-wrap: wrap;
            margin-top: 8px;
            gap: 5px;
        }

        .main-list.grid-view .actions {
            width: 100%;
            justify-content: space-between;
            margin-top: 5px;
        }

        .main-list.grid-view .actions button {
            flex: 1;
            padding: 0 5px;
            font-size: 11px;
        }

        .modal-overlay {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
        }

        /* 强制显示的类，由 Vue 绑定 */
        .modal-overlay.active {
            display: flex !important;
        }

        .modal-content {
            background: var(--bg-color);
            width: 500px;
            height: auto;
            max-height: 90vh;
            margin: 0;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        #proxyModal .modal-content {
            width: 800px;
            height: 85vh;
        }

        #helpModal .modal-content {
            width: 500px;
            height: 75vh;
        }

        #settingsModal .modal-content {
            width: 500px;
            height: 75vh;
        }

        #confirmModal .modal-content,
        #alertModal .modal-content {
            width: 350px;
            text-align: center;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            color: var(--accent);
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            min-height: 0;
        }

        .modal-footer {
            margin-top: 15px;
            text-align: right;
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        #preProxyList {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px;
            margin-bottom: 10px;
            min-height: 0;
        }

        .proxy-row {
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
            height: 40px;
            box-sizing: border-box;
        }

        .proxy-row:hover {
            background: rgba(128, 128, 128, 0.08);
        }

        .proxy-left {
            display: flex;
            align-items: center;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .proxy-mid {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 0;
            margin-right: 10px;
            height: 100%;
        }

        .proxy-header {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .proxy-proto {
            font-size: 9px;
            padding: 0 5px;
            border-radius: 3px;
            background: rgba(128, 128, 128, 0.2);
            color: var(--text-primary);
            font-weight: bold;
            flex-shrink: 0;
            margin-right: 8px;
            height: 18px;
            line-height: 18px;
            display: inline-block;
        }

        .proxy-remark {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 8px;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .proxy-latency {
            font-size: 10px;
            font-weight: bold;
            padding: 0 8px;
            border-radius: 4px;
            flex-shrink: 0;
            min-width: 50px;
            text-align: center;
            height: var(--row-height);
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 5px;
            line-height: 1;
            padding-top: 1px;
        }

        .proxy-right {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            height: 100%;
        }

        .proxy-right button {
            padding: 0 10px;
            font-size: 10px;
            min-width: 45px;
            margin: 0;
            height: var(--row-height);
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        #manualAddArea {
            background: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .tab-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tab-btn {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            display: inline-block;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .icon-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Update notification badge */
        .has-update {
            position: relative;
        }

        .has-update::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--card-bg);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            background: rgba(255, 255, 255, 0.05);
        }

        .help-section {
            display: none;
        }

        .help-section.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .export-option {
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }

        .export-option:hover {
            background: rgba(128, 128, 128, 0.1);
            border-color: var(--accent);
        }

        .export-title {
            font-weight: bold;
            font-size: 14px;
        }

        .export-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--splash-bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 0, 0.02) 3px);
            transition: opacity 0.5s ease;
        }

        #splash.fade-out {
            opacity: 0;
        }

        .glitch-wrapper {
            position: relative;
        }

        .glitch-text {
            font-size: 120px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0px;
            color: var(--splash-color);
            font-family: 'Arial', sans-serif;
            font-style: italic;
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--splash-bg);
        }

        .glitch-text::before {
            left: -4px;
            text-shadow: 2px 0 #00fff9;
            animation: glitch-anim-1 2.5s infinite reverse steps(2, end);
        }

        .glitch-text::after {
            left: 4px;
            text-shadow: -2px 0 #ff00c1;
            animation: glitch-anim-2 2s infinite reverse steps(2, end);
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(50% 0 30% 0);
                transform: translate(-5px, 0);
            }

            20% {
                clip-path: inset(10% 0 60% 0);
                transform: translate(5px, 0);
            }

            40% {
                clip-path: inset(80% 0 5% 0);
                transform: translate(-5px, 0);
            }

            60% {
                clip-path: inset(10% 0 80% 0);
                transform: translate(5px, 0);
            }

            80% {
                clip-path: inset(40% 0 20% 0);
                transform: translate(-5px, 0);
            }

            100% {
                clip-path: inset(20% 0 50% 0);
                transform: translate(0, 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(10% 0 10% 0);
                transform: translate(5px, 0);
            }

            30% {
                clip-path: inset(20% 0 60% 0);
                transform: translate(5px, 0);
            }

            60% {
                clip-path: inset(10% 0 80% 0);
                transform: translate(5px, 0);
            }

            90% {
                clip-path: inset(30% 0 40% 0);
                transform: translate(5px, 0);
            }

            100% {
                clip-path: inset(0 0 0 0);
                transform: translate(0, 0);
            }
        }

        /* settings-section visibility is now controlled by Vue v-if */

        .ext-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        /* Custom timezone dropdown */
        .timezone-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 10px;
        }

        .timezone-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: var(--input-bg);
            border: 1px solid var(--accent);
            border-radius: 4px;
            margin-top: 2px;
            z-index: 1000;
            display: none;
        }

        .timezone-dropdown.active {
            display: block;
        }

        .timezone-item {
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 12px;
            font-family: monospace;
            transition: background 0.2s;
        }

        .timezone-item:hover,
        .timezone-item.selected {
            background: var(--accent);
            color: var(--bg-color);
        }

        .timezone-item.hidden {
            display: none;
        }
    </style>
</head>

<body data-theme="geek">
    <div id="app"></div>
    <!-- Global Scripts -->
    <script type="module" src="/timezones.js"></script>
    <script type="module" src="/cities.js"></script>
    <script type="module" src="/languages.js"></script>
    <script type="module" src="/locales/zh-CN.js"></script>
    <script type="module" src="/i18n.js"></script>
    <!-- Entry Module -->
    <script type="module" src="/src/main.js"></script>
</body>

</html>
